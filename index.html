        :root {
            --cambridge-blue: #002f6c; 
            --cambridge-light: #00a1e4;

            --danger: #bd2130;
            --dark: #2d3748;
            --bg-gray: #f4f7fa;
        }
        body {
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            max-width: 750px;
            margin: 0 auto;
            padding: 20px;
            background-color: var(--bg-gray);
            color: var(--dark);
        }
        .header-logo {
            text-align: center;
            border-bottom: 4px solid var(--cambridge-light);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }
        .header-logo h1 {
            color: var(--cambridge-blue);
            margin: 0;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .header-logo span {
            color: var(--cambridge-light);
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 4px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e1e8ed;
        }
        .tabs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 6px;
            margin-bottom: 25px;
        }
        .tab-btn {
            background: #fff;
            border: 2px solid var(--cambridge-blue);
            padding: 10px 8px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            color: var(--cambridge-blue);
            border-radius: 4px;
            transition: all 0.1s ease;
        }
        .tab-btn:hover {
            background: #f0f4f8;
        }
        .tab-btn.active {
            background: var(--cambridge-blue);
            color: white;
        }
        .progress-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8fafc;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 25px;
            border-left: 4px solid var(--cambridge-light);
            font-size: 14px;
        }
        .score-badge {
            background: var(--cambridge-light);
            color: white;
            padding: 4px 12px;
            border-radius: 2px;
            font-weight: bold;
        }
        .question-box {
            font-size: 20px;
            margin-bottom: 25px;
            line-height: 1.6;
            background: #f1f5f9;
            padding: 25px;
            border-radius: 4px;
            color: var(--cambridge-blue);
            font-weight: 500;
        }
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 14px;
            border: 2px solid #cbd5e1;
            border-radius: 4px;
            font-size: 16px;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: var(--cambridge-blue);
        }
        button.action-btn {
            background: var(--cambridge-light);
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }
        button.action-btn:hover {
            background: #0087c2;
        }
        .feedback {
            font-weight: bold;
            padding: 15px;
            border-radius: 4px;
            margin-top: 15px;
            display: none;
            font-size: 15px;
        }
        .feedback.correct {
            background: #d4edda;
            color: var(--success);
            border: 1px solid #c3e6cb;
            display: block;
        }
        .feedback.incorrect {
            background: #f8d7da;
            color: var(--danger);
            border: 1px solid #f5c6cb;
            display: block;
        }
        .next-fast-btn {
            background: var(--dark);
            color: white;
            border: none;
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
            display: inline-block;
        }
        .next-fast-btn:hover {
            background: #1a202c;
        }
        .reset-btn {
            background: none;
            border: none;
            color: #7f8c8d;
            cursor: pointer;
            font-size: 13px;
            text-decoration: underline;
            display: block;
            margin: 25px auto 0;
        }
    </style>
</head>
